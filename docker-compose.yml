version: "3.9"

services:

  app:
    build: .
    container_name: chotu-app
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    container_name: chotu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chotu
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: chotu-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: